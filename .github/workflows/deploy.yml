name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # tag + release creation
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Syntax-check all scripts
        run: |
          for f in js/*.js test/*.js; do
            node --check "$f"
          done
      - name: Data-integrity tests
        run: node test/validate.js

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4

  release:
    needs: deploy
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - name: Tag release for current APP_VERSION (if new)
        run: |
          VERSION=$(grep -oP 'APP_VERSION = "\K[0-9]+\.[0-9]+\.[0-9]+' js/version.js)
          echo "APP_VERSION is $VERSION"
          if gh release view "v$VERSION" >/dev/null 2>&1; then
            echo "Release v$VERSION already exists; skipping."
          else
            gh release create "v$VERSION" --generate-notes --title "v$VERSION"
          fi
